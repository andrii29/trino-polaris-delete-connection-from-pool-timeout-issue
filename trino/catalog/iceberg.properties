# https://trino.io/docs/current/connector/iceberg.html#general-configuration
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://polaris:8181/api/catalog/
iceberg.rest-catalog.warehouse=${ENV:CATALOG_NAME}
iceberg.rest-catalog.vended-credentials-enabled=true
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.server-uri=http://polaris:8181/api/catalog/v1/oauth/tokens
iceberg.rest-catalog.oauth2.credential=${ENV:TRINO_OAUTH2_CLIENT_ID}:${ENV:TRINO_OAUTH2_CLIENT_SECRET}
iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL

# S3 settings for MinIO
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-west-2
s3.path-style-access=true
